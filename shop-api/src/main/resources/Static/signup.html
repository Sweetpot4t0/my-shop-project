<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>감자몰 - 회원가입</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f5f6fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 40px 0; }
        .signup-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 450px; }
        .logo { font-size: 30px; font-weight: 900; color: #e67e22; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .required-notice { font-size: 13px; margin-bottom: 20px; text-align: right; }
        .required-notice span { color: #e74c3c; font-weight: bold; }
        .required-notice em { color: #95a5a6; font-style: normal; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #333; }
        .input-label span { color: #e74c3c; }
        .flex-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 13px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 14px; }
        .side-btn { padding: 0 15px; background: white; border: 1px solid #e67e22; color: #e67e22; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .pw-guide { font-size: 12px; color: #7f8c8d; margin-top: 6px; }
        .submit-btn { width: 100%; padding: 16px; background: #e67e22; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        /* 벨리데이션 메시지 스타일 */
        .msg { font-size: 12px; margin-top: 5px; display: none; }
        .success { color: #2ecc71; display: block; }
        .error { color: #e74c3c; display: block; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo" onclick="location.href='/'">🥔 감자몰</div>
    <div class="required-notice"><span>*</span> <em>는 필수입니다.</em></div>

    <div class="input-group">
        <label class="input-label">아이디 <span>*</span></label>
        <div class="flex-row">
            <input type="text" id="loginId" placeholder="사용할 아이디 입력">
            <button class="side-btn" onclick="checkDuplicate()">중복확인</button>
        </div>
        <div id="idMsg" class="msg"></div>
    </div>

    <div class="input-group">
        <label class="input-label">비밀번호 <span>*</span></label>
        <input type="password" id="password" placeholder="비밀번호 입력">
        <div class="pw-guide">대문자, 소문자, 특수문자를 전부 사용하여<br>8~12자 내로 입력하여 주세요.</div>
        <div id="pwMsg" class="msg"></div>
    </div>

    <div class="input-group">
        <label class="input-label">비밀번호 재확인 <span>*</span></label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력">
        <div id="pwConfirmMsg" class="msg"></div>
    </div>

    <div class="input-group">
        <label class="input-label">이메일 <span>*</span></label>
        <input type="email" id="email" placeholder="example@example.com">
    </div>

    <div class="input-group">
        <label class="input-label">휴대폰 번호 <span>*</span></label>
        <div class="flex-row">
            <input type="tel" id="phone" placeholder="010-0000-0000">
            <button class="side-btn" onclick="alert('인증번호 발송 완료!')">인증하기</button>
        </div>
    </div>

    <div class="input-group">
        <label class="input-label">이름 <span>*</span></label>
        <input type="text" id="name" placeholder="실명을 입력하세요">
    </div>

    <button class="submit-btn" onclick="signup()">회원가입 완료</button>
</div>

<script>
    let isIdChecked = false; // 중복확인 통과 여부

    // 1. 아이디 중복확인 로직
    function checkDuplicate() {
        const loginId = document.getElementById('loginId').value;
        const idMsg = document.getElementById('idMsg');

        if(!loginId) { alert('아이디를 입력해주세요.'); return; }

        fetch(`/api/member/check-id?loginId=${loginId}`)
            .then(res => res.json())
            .then(isDuplicate => {
                if(isDuplicate) {
                    idMsg.innerText = "❌ 이미 사용 중인 아이디입니다.";
                    idMsg.className = "msg error";
                    isIdChecked = false;
                } else {
                    idMsg.innerText = "✅ 사용 가능한 아이디입니다!";
                    idMsg.className = "msg success";
                    isIdChecked = true;
                }
            });
    }

    // 2. 비밀번호 유효성 검사 (정규식)
    function validatePassword(pw) {
        // 대문자, 소문자, 특수문자 포함 8~12자
        const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+={}\[\]:;"'<>,.?\/\\-]).{8,12}$/;
        return regex.test(pw);
    }

    // 3. 회원가입 제출 로직
    function signup() {
        const pw = document.getElementById('password').value;
        const pwConfirm = document.getElementById('passwordConfirm').value;
        const pwMsg = document.getElementById('pwMsg');
        const pwConfirmMsg = document.getElementById('pwConfirmMsg');

        // (1) 중복확인 체크
        if(!isIdChecked) { alert('아이디 중복확인을 먼저 해주세요.'); return; }

        // (2) 비밀번호 복잡성 체크
        if(!validatePassword(pw)) {
            pwMsg.innerText = " 비밀번호 규칙을 확인해주세요.";
            pwMsg.className = "msg error";
            return;
        } else { pwMsg.style.display = 'none'; }

        // (3) 비밀번호 일치 체크
        if(pw !== pwConfirm) {
            pwConfirmMsg.innerText = " 비밀번호가 일치하지 않습니다.";
            pwConfirmMsg.className = "msg error";
            return;
        } else { pwConfirmMsg.style.display = 'none'; }

        // (4) 모든 검증 통과 시 서버 전송
        const data = {
            loginId: document.getElementById('loginId').value,
            password: pw,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
        };

        fetch('/api/member/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(status => {
            if(status === 'success') {
                alert('회원가입 되었습니다.');
                location.href = '/login.html';
            } else {
                alert('가입 실패: 이미 존재하는 아이디일 수 있습니다.');
            }
        });
    }
</script>
</body>
</html>
